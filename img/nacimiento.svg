  <text x="400" y="465" font-family="Georgia,serif" font-size="19" fill="white" text-anchor="middle" opacity="0.9">Nacimiento del Río Segura · 1.413 m altitud · Fuente Segura</text>
  <text x="400" y="488" font-family="Georgia,serif" font-size="13" fill="rgba(255,255,255,0.65)" text-anchor="middle">Santiago-Pontones · Sierra de Segura · Jaén</text>
